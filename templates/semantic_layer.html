{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">Semantic KPI Governance Layer</h1>

<div class="table-card">

<table class="table table-dark table-striped">

    <thead>
        <tr>
            <th>KPI</th>
            <th>Definition</th>
            <th>Owner</th>
            <th>Source</th>
        </tr>
    </thead>

    <tbody>

        {% for kpi in kpis %}

        <tr>
            <td>{{ kpi.name }}</td>
            <td>{{ kpi.definition }}</td>
            <td>{{ kpi.owner }}</td>
            <td>{{ kpi.source }}</td>
        </tr>

        {% endfor %}

    </tbody>

</table>

</div>

{% endblock %}
